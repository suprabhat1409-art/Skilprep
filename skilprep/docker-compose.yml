version: '3.8'
services:
  mongo:
    image: mongo:6
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/skilprep
      - JWT_SECRET=change-me-in-prod
    depends_on:
      - mongo
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build:
      context: ./client
    restart: unless-stopped
    ports:
      - "5173:80"

volumes:
  mongo-data:
